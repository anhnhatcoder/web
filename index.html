<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Mỹ Phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background: #343a40; color: white; position: fixed; width: 240px; }
        .sidebar a { color: white; text-decoration: none; padding: 15px; display: block; }
        .sidebar a:hover { background: #495057; }
        .main-content { margin-left: 240px; padding: 20px; }
        .card-header { background: #fff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h4 class="text-center py-4">Hệ Thống Quản Lý</h4>
        <a href="#">📦 Quản lý đơn hàng</a>
        <a href="#">🏠 Quản lý kho</a>
        <a href="#">👥 Khách hàng</a>
        <a href="#">📊 Báo cáo doanh thu</a>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Danh sách đơn hàng</h2>
            <button class="btn btn-primary" onclick="loadData()">🔄 Làm mới dữ liệu</button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Mã Đơn</th>
                            <th>Tên Khách Hàng</th>
                            <th>Sản Phẩm</th>
                            <th>Trạng Thái</th>
                            <th>Tổng Tiền</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        <tr><td colspan="5" class="text-center">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Thay link Web App URL từ Apps Script của bạn vào đây
        const API_URL = "URL_APPS_SCRIPT_CỦA_BẠN";

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                let html = "";
                data.forEach(row => {
                    html += `
                        <tr>
                            <td>${row.MaDon}</td>
                            <td>${row.TenKH}</td>
                            <td>${row.SanPham}</td>
                            <td><span class="badge bg-info">${row.TrangThai}</span></td>
                            <td>${row.TongTien} VNĐ</td>
                        </tr>
                    `;
                });
                document.getElementById("data-table").innerHTML = html;
            } catch (error) {
                console.error("Lỗi:", error);
                document.getElementById("data-table").innerHTML = "<tr><td colspan='5'>Không thể lấy dữ liệu!</td></tr>";
            }
        }

        // Tự động tải dữ liệu khi mở web
        window.onload = loadData;
    </script>
</body>
</html>
